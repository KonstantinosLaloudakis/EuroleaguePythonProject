name: Daily WP Replay Update

on:
  schedule:
    # Run at 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy plotly euroleague-api

    - name: Fetch Latest Season Data
      run: |
        python fetch_all_seasons.py

    - name: Preprocess WP JSON Data
      run: |
        python preprocess_wp_data.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/data/ data_cache/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update WP Replay data pipeline" && git push)
